version: "3.8"

x-config-host: &config-host ${HOST:-0.0.0.0}
x-config-port: &config-port ${PORT:-8080}

services:
  nonebot:
    build: .
    ports:
      - "29003:8080"
    env_file:
      - .env.local
    environment:
      ENVIRONMENT: local
      HOST: *config-host
      PORT: *config-port
      DOCKER: "true"
    volumes:
      - ./data:/app/data
      - ./.env.local:/app/.env.local:ro
    restart: always
    deploy:
      resources:
        limits:
          memory: ${NONEBOT_MEMORY_LIMIT:-3g}
    depends_on:
      redis:
        condition: service_started
      playwright:
        condition: service_healthy
    networks:
      - xiaobawang

  playwright:
    image: mcr.microsoft.com/playwright:v1.56.0-noble
    command: npx playwright@1.56.0 run-server --port 3000 --host 0.0.0.0
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/json/version"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - xiaobawang

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - xiaobawang

networks:
  xiaobawang:
    driver: bridge