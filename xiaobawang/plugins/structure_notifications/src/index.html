<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVE 寤虹瓚閫氱煡绠＄悊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' };</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors">
    <script>
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            document.documentElement.classList.toggle('dark', e.matches);
        });
    </script>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6 text-center">馃彈锔?EVE 寤虹瓚閫氱煡绠＄悊</h1>

        <!-- 鈹€鈹€ 绗竴姝? Bot 楠岃瘉鐮佺櫥褰?鈹€鈹€ -->
        <div id="login-section" class="text-center py-16 hidden">
            <p class="text-gray-500 dark:text-gray-400 mb-6">鍦ㄦ満鍣ㄤ汉浼氳瘽涓彂閫佷互涓嬪懡浠や互鐧诲綍</p>

            <!-- 鍔犺浇涓?-->
            <div id="vc-loading" class="hidden">
                <p class="text-gray-400 text-sm">姝ｅ湪鐢熸垚楠岃瘉鐮佲€?/p>
            </div>

            <!-- 寰呴獙璇?-->
            <div id="vc-pending" class="hidden">
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">璇峰湪鐩爣鑱婂ぉ浼氳瘽涓彂閫侊細</p>
                <div class="inline-flex items-center gap-3 border-2 border-dashed border-green-400 dark:border-green-500 rounded-lg px-6 py-4 cursor-pointer hover:bg-green-50 dark:hover:bg-green-900/20 transition"
                     id="vc-copy-area" title="鐐瑰嚮澶嶅埗">
                    <code id="vc-code" class="text-2xl font-mono font-bold text-green-600 dark:text-green-400 tracking-widest select-all"></code>
                    <span id="vc-copy-hint" class="text-xs text-gray-400">鐐瑰嚮澶嶅埗</span>
                </div>
                <p class="mt-3 text-xs text-gray-400">楠岃瘉鐮?<span id="vc-countdown"></span> 绉掑悗杩囨湡</p>
            </div>

            <!-- 宸茶繃鏈?-->
            <div id="vc-expired" class="hidden">
                <p class="text-gray-500 dark:text-gray-400 mb-4">楠岃瘉鐮佸凡杩囨湡</p>
                <button id="vc-refresh-btn"
                        class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition text-sm">
                    閲嶆柊鑾峰彇楠岃瘉鐮?
                </button>
            </div>

            <div id="login-error" class="mt-4 text-red-500 text-sm hidden"></div>
        </div>

        <!-- 鈹€鈹€ 绗簩姝? 閫夋嫨 EVE 瑙掕壊 鈹€鈹€ -->
        <div id="char-section" class="hidden">
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-6 mb-6">
                <h2 class="text-lg font-semibold mb-4">閫夋嫨瑕佺鐞嗙殑 EVE 瑙掕壊</h2>
                <div id="char-list" class="space-y-2 mb-4">
                    <p class="text-gray-400 text-sm">鍔犺浇涓€?/p>
                </div>
                <button id="add-char-btn"
                        class="mt-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition text-sm inline-flex items-center gap-2">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
                    </svg>
                    鎺堟潈鏂拌鑹?(EVE OAuth)
                </button>
                <p class="mt-2 text-xs text-gray-400">鎺堟潈鍚庤鑹插皢鍑虹幇鍦ㄥ垪琛ㄤ腑锛岀偣鍑诲嵆鍙€夋嫨</p>
                <div id="char-error" class="mt-3 text-red-500 text-sm hidden"></div>
            </div>
            <button id="char-logout-btn" class="text-xs text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition">
                閲嶆柊楠岃瘉鐧诲綍
            </button>
        </div>

        <!-- 鈹€鈹€ 绗笁姝? 绠＄悊闈㈡澘 鈹€鈹€ -->
        <div id="main-section" class="hidden">
            <!-- 瑙掕壊淇℃伅 -->
            <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 p-4 mb-6 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <img id="char-portrait" class="w-10 h-10 rounded-full" src="" alt="" />
                    <div>
                        <p class="font-medium" id="char-name"></p>
                        <p class="text-xs text-gray-400" id="char-id"></p>
                    </div>
                </div>
                <button id="logout-btn"
                        class="text-sm px-3 py-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded transition">
                    鍒囨崲瑙掕壊
                </button>
            </div>

            <!-- 娴佺▼璇存槑 -->
            <div class="bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 rounded-lg p-4 mb-6 text-sm">
                <p class="font-semibold mb-1">濡備綍娣诲姞璁㈤槄:</p>
                <ol class="list-decimal list-inside space-y-1 text-gray-600 dark:text-gray-300">
                    <li>鍕鹃€夐渶瑕佹帴鏀剁殑閫氱煡绫诲埆</li>
                    <li>鐐瑰嚮銆屽垱寤鸿闃呫€嶏紝閫氱煡灏嗘帹閫佸埌浣犲彂閫侀獙璇佺爜鐨勪細璇?/li>
                </ol>
            </div>

            <!-- 閫夋嫨绫诲埆 -->
            <section class="mb-6">
                <h2 class="text-lg font-semibold mb-3">閫夋嫨閫氱煡绫诲埆</h2>
                <div id="categories-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
            </section>

            <!-- 鍒涘缓璁㈤槄 -->
            <section class="mb-6">
                <button id="create-sub-btn"
                        class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition">
                    鍒涘缓璁㈤槄
                </button>
                <span id="create-sub-msg" class="ml-3 text-sm hidden"></span>
            </section>

            <hr class="border-gray-200 dark:border-gray-700 my-8" />

            <!-- 宸叉湁璁㈤槄 -->
            <section>
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-lg font-semibold">宸叉湁璁㈤槄</h2>
                    <div class="flex items-center gap-3">
                        <span id="subs-updated" class="text-xs text-gray-400 hidden"></span>
                        <button id="refresh-subs-btn"
                                class="text-sm px-3 py-1 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 rounded transition flex items-center gap-1">
                            <svg id="refresh-icon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                            </svg>
                            鍒锋柊
                        </button>
                    </div>
                </div>
                <div id="subscriptions-container">
                    <p class="text-gray-400 text-sm">鍔犺浇涓€?/p>
                </div>
            </section>
        </div>
    </div>

    <script>
        const BASE = window.location.pathname.replace(/\/page\/?$/, '');
        let authToken = null;

        // 鈹€鈹€ UI 鐘舵€佹帶鍒?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        function showSection(id) {
            ['login-section', 'char-section', 'main-section'].forEach(s => {
                document.getElementById(s).classList.toggle('hidden', s !== id);
            });
        }

        function showLoginState(state) {
            ['vc-loading', 'vc-pending', 'vc-expired'].forEach(s => {
                document.getElementById(s).classList.toggle('hidden', s !== `vc-${state}`);
            });
        }

        // 鈹€鈹€ 鐧诲綍楠岃瘉鐮?鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        let _loginCode = null;
        let _pollTimer = null;
        let _countdownTimer = null;

        async function fetchLoginCode() {
            showSection('login-section');
            showLoginState('loading');
            clearTimers();

            try {
                const res = await fetch(`${BASE}/api/login-code`);
                const json = await res.json();
                if (json.code !== 200) throw new Error(json.msg);
                _loginCode = json.data.code;
                const expiry = json.data.expires_in;

                document.getElementById('vc-code').textContent = `/verify ${_loginCode}`;
                startCountdown(expiry);
                showLoginState('pending');
                startLoginPoll();
            } catch (e) {
                showError('login-error', '鐢熸垚楠岃瘉鐮佸け璐? ' + e.message);
                showLoginState('expired');
            }
        }

        function startCountdown(seconds) {
            let remaining = seconds;
            const el = document.getElementById('vc-countdown');
            el.textContent = remaining;
            _countdownTimer = setInterval(() => {
                remaining--;
                el.textContent = remaining;
                if (remaining <= 0) {
                    clearTimers();
                    showLoginState('expired');
                }
            }, 1000);
        }

        function startLoginPoll() {
            _pollTimer = setInterval(async () => {
                if (!_loginCode) return;
                try {
                    const res = await fetch(`${BASE}/api/login-code/${_loginCode}/status`);
                    const json = await res.json();
                    if (json.code !== 200) return;
                    const status = json.data?.status;
                    if (status === 'done') {
                        clearTimers();
                        authToken = json.data.token;
                        localStorage.setItem('struct_notify_token', authToken);
                        await showCharSelect();
                    } else if (status === 'expired') {
                        clearTimers();
                        showLoginState('expired');
                    }
                } catch { /* ignore */ }
            }, 2000);
        }

        function clearTimers() {
            if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
            if (_countdownTimer) { clearInterval(_countdownTimer); _countdownTimer = null; }
        }

        document.getElementById('vc-copy-area').addEventListener('click', () => {
            const text = document.getElementById('vc-code').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const hint = document.getElementById('vc-copy-hint');
                hint.textContent = '宸插鍒?鉁?;
                setTimeout(() => { hint.textContent = '鐐瑰嚮澶嶅埗'; }, 1500);
            });
        });

        document.getElementById('vc-refresh-btn').addEventListener('click', fetchLoginCode);

        // 鈹€鈹€ 瑙掕壊閫夋嫨 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        async function showCharSelect() {
            showSection('char-section');
            await loadCharacters();
        }

        async function loadCharacters() {
            const container = document.getElementById('char-list');
            container.innerHTML = '<p class="text-gray-400 text-sm">鍔犺浇涓€?/p>';
            try {
                const res = await fetch(apiUrl('/api/characters'));
                const json = await res.json();
                if (json.code !== 200) throw new Error(json.msg);
                const chars = json.data || [];
                if (!chars.length) {
                    container.innerHTML = '<p class="text-gray-400 text-sm">鏆傛棤宸叉巿鏉冭鑹诧紝璇风偣鍑讳笅鏂广€屾巿鏉冩柊瑙掕壊銆?/p>';
                    return;
                }
                container.innerHTML = '';
                chars.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'w-full flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-blue-50 dark:hover:bg-blue-900/20 transition text-left';
                    btn.innerHTML = `
                        <img src="https://images.evetech.net/characters/${c.character_id}/portrait?size=32"
                             class="w-8 h-8 rounded-full" alt="" />
                        <div>
                            <p class="font-medium text-sm">${c.character_name}</p>
                            <p class="text-xs text-gray-400">ID: ${c.character_id}</p>
                        </div>`;
                    btn.addEventListener('click', () => selectCharacter(c.character_id));
                    container.appendChild(btn);
                });
            } catch (e) {
                showError('char-error', '鍔犺浇瑙掕壊鍒楄〃澶辫触: ' + e.message);
            }
        }

        async function selectCharacter(characterId) {
            try {
                const res = await fetch(apiUrl('/api/session/character') + `&character_id=${characterId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character_id: characterId }),
                });
                const json = await res.json();
                if (json.code !== 200) throw new Error(json.msg);
                showMain({ character_id: json.data.character_id, character_name: json.data.character_name });
            } catch (e) {
                showError('char-error', '閫夋嫨瑙掕壊澶辫触: ' + e.message);
            }
        }

        document.getElementById('add-char-btn').addEventListener('click', async () => {
            try {
                const res = await fetch(apiUrl('/api/auth/url'), { method: 'POST' });
                const json = await res.json();
                if (json.code !== 200) throw new Error(json.msg);
                window.location.href = json.data.auth_url;
            } catch (e) {
                showError('char-error', '鑾峰彇鎺堟潈閾炬帴澶辫触: ' + e.message);
            }
        });

        document.getElementById('char-logout-btn').addEventListener('click', logout);

        // 鈹€鈹€ 绠＄悊闈㈡澘 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        function showMain(user) {
            showSection('main-section');
            document.getElementById('char-name').textContent = user.character_name;
            document.getElementById('char-id').textContent = 'ID: ' + user.character_id;
            document.getElementById('char-portrait').src =
                `https://images.evetech.net/characters/${user.character_id}/portrait?size=64`;
            loadCategories();
            loadSubscriptions();
        }

        document.getElementById('logout-btn').addEventListener('click', () => showCharSelect());

        // 鈹€鈹€ 宸ュ叿鍑芥暟 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        function apiUrl(path) {
            const url = new URL(`${BASE}${path}`, window.location.origin);
            if (authToken) url.searchParams.set('token', authToken);
            return url.toString();
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function logout() {
            clearTimers();
            localStorage.removeItem('struct_notify_token');
            authToken = null;
            fetchLoginCode();
        }

        // 鈹€鈹€ 绫诲埆 & 璁㈤槄 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        let categoriesData = [];
        async function loadCategories() {
            const res = await fetch(apiUrl('/api/categories'));
            const json = await res.json();
            categoriesData = json.data || [];
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            categoriesData.forEach(cat => {
                const label = document.createElement('label');
                label.className = 'flex items-center gap-2 p-2 rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer transition';
                label.innerHTML = `
                    <input type="checkbox" value="${cat.key}" class="cat-checkbox w-4 h-4 text-blue-600 rounded"
                           ${cat.key === 'structure' ? 'checked' : ''} />
                    <span class="text-sm">${cat.label}
                        <span class="text-xs text-gray-400">(${cat.types.length})</span>
                    </span>`;
                container.appendChild(label);
            });
        }

        function getSelectedCategories() {
            return [...document.querySelectorAll('.cat-checkbox:checked')].map(el => el.value);
        }

        document.getElementById('create-sub-btn').addEventListener('click', async () => {
            const cats = getSelectedCategories();
            if (!cats.length) return alert('璇疯嚦灏戦€夋嫨涓€绉嶉€氱煡绫诲埆');
            const msgEl = document.getElementById('create-sub-msg');
            msgEl.textContent = '鍒涘缓涓€?;
            msgEl.className = 'ml-3 text-sm text-gray-500';
            msgEl.classList.remove('hidden');
            try {
                const res = await fetch(apiUrl('/api/subscriptions'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ categories: cats }),
                });
                const json = await res.json();
                if (json.code !== 200) throw new Error(json.msg);
                msgEl.textContent = '鉁?璁㈤槄鍒涘缓鎴愬姛';
                msgEl.className = 'ml-3 text-sm text-green-600 dark:text-green-400';
                loadSubscriptions();
                setTimeout(() => { msgEl.classList.add('hidden'); }, 3000);
            } catch (e) {
                msgEl.textContent = '鉂?鍒涘缓澶辫触: ' + e.message;
                msgEl.className = 'ml-3 text-sm text-red-500';
            }
        });

        async function loadSubscriptions() {
            const container = document.getElementById('subscriptions-container');
            if (!container.children.length) {
                container.innerHTML = '<p class="text-gray-400 text-sm">鍔犺浇涓€?/p>';
            }
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');
            try {
                const res = await fetch(apiUrl('/api/subscriptions'));
                const json = await res.json();
                const subs = json.data || [];
                if (!subs.length) {
                    container.innerHTML = '<p class="text-gray-400 text-sm">鏆傛棤璁㈤槄锛岃鍏堥€夋嫨绫诲埆骞剁偣鍑汇€屽垱寤鸿闃呫€?/p>';
                    return;
                }
                container.innerHTML = '';
                subs.forEach(sub => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between p-3 mb-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800';
                    const cats = (sub.categories || []).join(', ');
                    div.innerHTML = `
                        <div class="text-sm">
                            <p>
                                <span class="font-medium">${sub.session_id}</span>
                                <span class="text-xs text-gray-400">${sub.platform} / ${sub.session_type}</span>
                            </p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">绫诲埆: ${cats}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="testPush(${sub.id})"
                                class="text-xs px-2 py-1 rounded bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300 hover:bg-purple-200 dark:hover:bg-purple-800 transition">
                                娴嬭瘯鎺ㄩ€?
                            </button>
                            <button onclick="toggleSub(${sub.id}, ${!sub.is_enabled})"
                                class="text-xs px-2 py-1 rounded ${sub.is_enabled
                                    ? 'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300'
                                    : 'bg-gray-200 text-gray-600 dark:bg-gray-700 dark:text-gray-400'}">
                                ${sub.is_enabled ? '宸插惎鐢? : '宸茬鐢?}
                            </button>
                            <button onclick="deleteSub(${sub.id})"
                                class="text-xs px-2 py-1 rounded bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300 hover:bg-red-200 dark:hover:bg-red-800 transition">
                                鍒犻櫎
                            </button>
                        </div>`;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = `<p class="text-red-500 text-sm">鍔犺浇澶辫触: ${e.message}</p>`;
            } finally {
                icon.classList.remove('animate-spin');
                const ts = document.getElementById('subs-updated');
                ts.textContent = '鏇存柊浜?' + new Date().toLocaleTimeString();
                ts.classList.remove('hidden');
            }
        }

        document.getElementById('refresh-subs-btn').addEventListener('click', loadSubscriptions);

        async function toggleSub(subId, enabled) {
            await fetch(apiUrl(`/api/subscriptions/${subId}`), {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_enabled: enabled }),
            });
            loadSubscriptions();
        }

        async function deleteSub(subId) {
            if (!confirm('纭鍒犻櫎璇ヨ闃?')) return;
            await fetch(apiUrl(`/api/subscriptions/${subId}`), { method: 'DELETE' });
            loadSubscriptions();
        }

        async function testPush(subId) {
            try {
                const res = await fetch(apiUrl(`/api/subscriptions/${subId}/test`), { method: 'POST' });
                const json = await res.json();
                if (json.code !== 200) throw new Error(json.msg);
                alert('娴嬭瘯娑堟伅宸插彂閫侊紝璇峰埌鑱婂ぉ涓煡鐪?);
            } catch (e) {
                alert('娴嬭瘯鎺ㄩ€佸け璐? ' + e.message);
            }
        }

        // 鈹€鈹€ 鍚姩 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€

        async function init() {
            // 妫€鏌?URL 鍙傛暟锛堜粠 EVE OAuth 鍥炶烦鏃舵惡甯︼級
            const params = new URLSearchParams(window.location.search);
            if (params.get('token')) {
                authToken = params.get('token');
                localStorage.setItem('struct_notify_token', authToken);
                history.replaceState(null, '', window.location.pathname);
            } else {
                authToken = localStorage.getItem('struct_notify_token');
            }
            if (params.get('error')) {
                showError('login-error', '鎺堟潈澶辫触: ' + decodeURIComponent(params.get('error')));
            }

            if (authToken) {
                // 楠岃瘉 session 鏄惁鏈夋晥
                try {
                    const res = await fetch(apiUrl('/api/auth/me'));
                    const json = await res.json();
                    if (json.code === 200) {
                        const user = json.data;
                        if (user.character_id) {
                            showMain(user);
                            return;
                        }
                        // 宸茬櫥褰曚絾鏈€夎鑹?
                        await showCharSelect();
                        return;
                    }
                } catch { /* fall through */ }
                localStorage.removeItem('struct_notify_token');
                authToken = null;
            }

            await fetchLoginCode();
        }

        init();
    </script>
